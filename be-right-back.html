<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AFC SME | Be Right Back</title>
  <style>
    :root {
      --bg-1: #0f1d57;
      --bg-2: #1c2f7d;
      --card: rgba(255, 255, 255, 0.1);
      --text: #f4f7ff;
      --muted: #c8d3ff;
      --accent: #ff6b6b;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 10%, rgba(255, 255, 255, 0.12), transparent 35%),
        radial-gradient(circle at 80% 90%, rgba(255, 255, 255, 0.08), transparent 30%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
    }

    .wrap {
      min-height: 100%;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(680px, 100%);
      text-align: center;
      padding: 36px 28px;
      border-radius: 20px;
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(8px);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.3);
    }

    .logo {
      width: 128px;
      height: 128px;
      object-fit: contain;
      animation: bounce 1.4s ease-in-out infinite;
      filter: drop-shadow(0 10px 18px rgba(0, 0, 0, 0.25));
      user-select: none;
      -webkit-user-drag: none;
    }

    h1 {
      margin: 18px 0 10px;
      font-size: clamp(28px, 5vw, 44px);
      line-height: 1.1;
      letter-spacing: 0.3px;
    }

    p {
      margin: 8px auto 0;
      max-width: 520px;
      font-size: clamp(15px, 2.4vw, 18px);
      line-height: 1.65;
      color: var(--muted);
    }

    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      margin: 0 2px;
      border-radius: 999px;
      background: var(--accent);
      animation: blink 1.2s infinite;
    }

    .dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes bounce {
      0%, 100% {
        transform: translateY(0);
      }
      40% {
        transform: translateY(-16px);
      }
      60% {
        transform: translateY(-8px);
      }
    }

    @keyframes blink {
      0%, 80%, 100% {
        opacity: 0.25;
      }
      40% {
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card" aria-live="polite">
      <img class="logo" src="./src/Images/logo.png" alt="AFC SME logo" />
      <h1>Be Right Back</h1>
      <p>
        We are currently doing a quick system update to serve you better.
        Please check back in a little while.
      </p>
      <p>
        Loading
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
      </p>
    </section>
  </main>
</body>
</html>
